<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ברית לבנם של ערן וניקול</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="icon">👶</div>
        <h1 class="main-title">ברוכים הבאים לברית של הבן של ערן וניקול</h1>
      </div>

      <div class="loading-section">
        <div class="spinner">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <p class="status-text" id="statusText">בודקים שהאתר מוכן...</p>
      </div>

      <div class="event-details">
        <div class="detail-item">
          <span class="detail-icon">📅</span>
          <span class="detail-text">יום ראשון, 17.05.2026</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🕐</span>
          <span class="detail-text">בשעה 16:40</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">📍</span>
          <span class="detail-text">מסעדת מזל</span>
        </div>
      </div>

      <div class="calm-text">
        לעיתים פתיחת האתר לוקחת כמה רגעים. תודה על הסבלנות.
      </div>

      <div class="footer">
        ערן וניקול שמחים להזמין אתכם
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
